<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Mode — Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --rose: #f2a7b8;
            --rose-light: #fce4ec;
            --rose-deep: #e88fa3;
            --blush: #fdf0f3;
            --sage: #b8cfc0;
            --cream: #fdfaf7;
            --text: #3d2c30;
            --muted: #9e7e84;
            --border: rgba(242,167,184,0.3);
            --card: rgba(255,255,255,0.78);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--blush);
            min-height: 100vh;
            padding-bottom: 90px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
            overflow-x: hidden;
        }

        .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
        .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(242,167,184,0.18) 0%, transparent 70%); top: -100px; right: -100px; }
        .blob-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(184,207,192,0.14) 0%, transparent 70%); bottom: 80px; left: -80px; }

        .profile-header {
            position: relative; z-index: 1;
            background: linear-gradient(160deg, #e8a0b0 0%, #f2c4ce 60%, #d4b8c4 100%);
            padding: 3rem 1.5rem 5rem;
            text-align: center;
            overflow: hidden;
        }

        .back-btn {
            position: absolute; top: 1.2rem; left: 1.2rem;
            background: rgba(255,255,255,0.25);
            border-radius: 12px; padding: 0.5rem 0.9rem;
            color: white; font-size: 0.85rem;
            text-decoration: none;
            display: flex; align-items: center; gap: 5px;
        }

        .avatar { width: 90px; height: 90px; border-radius: 50%; }

        .nav-bottom {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(253,240,243,0.92);
            border-top: 1px solid var(--border);
            padding: 10px 0 14px;
        }

        .nav-inner { display: flex; justify-content: space-around; }

        .page-exit { animation: fadeOut 0.4s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>

<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- HEADER -->
<div class="profile-header">
    <a href="dashboard.html" class="back-btn" onclick="navigateTo(event, 'dashboard.html')">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
    <img src="https://i.pravatar.cc/200?u=aya" class="avatar" alt="Aya"/>
    <div>Aya</div>
</div>

<!-- NAV -->
<div class="nav-bottom">
    <div class="nav-inner">
        <a href="dashboard.html" onclick="navigateTo(event, 'dashboard.html')">Accueil</a>
    </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script>
function navigateTo(e, url) {
    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(() => window.location.href = url, 400);
}
</script>

</body>
</html>
